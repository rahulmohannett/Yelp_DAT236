version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: yelp-mongodb
    environment:
      MONGO_INITDB_DATABASE: yelp_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yelp-network

  # Kafka Broker (KRaft mode - no Zookeeper)
  kafka:
    image: bitnami/kafka:3.6
    container_name: yelp-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_LOG_RETENTION_HOURS: 24
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yelp-network

  # User Service (Port 8001)
  user-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yelp-user-service
    environment:
      MONGO_URI: mongodb://mongodb:27017/yelp_db
      SECRET_KEY: seekrit4ron
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      CORS_ORIGINS: http://localhost:5173,http://localhost,http://127.0.0.1
    command: uvicorn app.main_user:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    volumes:
      - ./backend/app:/app/app
      - ./backend/uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - yelp-network

  # Owner Service (Port 8002)
  owner-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yelp-owner-service
    environment:
      MONGO_URI: mongodb://mongodb:27017/yelp_db
      SECRET_KEY: seekrit4ron
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      CORS_ORIGINS: http://localhost:5173,http://localhost,http://127.0.0.1
    command: uvicorn app.main_owner:app --host 0.0.0.0 --port 8002 --reload
    ports:
      - "8002:8002"
    volumes:
      - ./backend/app:/app/app
      - ./backend/uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - yelp-network

  # Restaurant Service (Port 8003)
  restaurant-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yelp-restaurant-service
    environment:
      MONGO_URI: mongodb://mongodb:27017/yelp_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SECRET_KEY: seekrit4ron
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      CORS_ORIGINS: http://localhost:5173,http://localhost,http://127.0.0.1
    command: uvicorn app.main_restaurant:app --host 0.0.0.0 --port 8003 --reload
    ports:
      - "8003:8003"
    volumes:
      - ./backend/app:/app/app
      - ./backend/uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - yelp-network

  # Review Service (Port 8004)
  review-service:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yelp-review-service
    environment:
      MONGO_URI: mongodb://mongodb:27017/yelp_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SECRET_KEY: seekrit4ron
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
      CORS_ORIGINS: http://localhost:5173,http://localhost,http://127.0.0.1
    command: uvicorn app.main_review:app --host 0.0.0.0 --port 8004 --reload
    ports:
      - "8004:8004"
    volumes:
      - ./backend/app:/app/app
      - ./backend/uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - yelp-network

  # Review Worker (Kafka Consumer - Port 8005)
  review-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yelp-review-worker
    environment:
      MONGO_URI: mongodb://mongodb:27017/yelp_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SECRET_KEY: seekrit4ron
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
    command: uvicorn app.main_review_worker:app --host 0.0.0.0 --port 8005 --reload
    ports:
      - "8005:8005"
    volumes:
      - ./backend/app:/app/app
      - ./backend/uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - yelp-network

  # Restaurant Worker (Kafka Consumer - Port 8006)
  restaurant-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yelp-restaurant-worker
    environment:
      MONGO_URI: mongodb://mongodb:27017/yelp_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SECRET_KEY: seekrit4ron
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
    command: uvicorn app.main_restaurant_worker:app --host 0.0.0.0 --port 8006 --reload
    ports:
      - "8006:8006"
    volumes:
      - ./backend/app:/app/app
      - ./backend/uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - yelp-network

  # Frontend Service (Port 80)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yelp-frontend
    ports:
      - "80:80"
    depends_on:
      - user-service
      - owner-service
      - restaurant-service
      - review-service
    networks:
      - yelp-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  mongodb_data:
    driver: local
  uploads_data:
    driver: local
  kafka_data:
    driver: local

networks:
  yelp-network:
    driver: bridge
