---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-init-script
  namespace: yelp-prototype
data:
  init.js: |
    // Initialize yelp_db database and collections
    db.createCollection("users");
    db.createCollection("restaurants");
    db.createCollection("reviews");
    db.createCollection("favorites");
    db.createCollection("restaurant_claims");
    db.createCollection("chat_conversations");
    db.createCollection("chat_messages");
    db.createCollection("sessions");
    
    // Create TTL index on sessions (7 days)
    db.sessions.createIndex({ "expires_at": 1 }, { expireAfterSeconds: 0 });
    
    // Create indexes for common queries
    db.users.createIndex({ "email": 1 }, { unique: true });
    db.restaurants.createIndex({ "name": 1 });
    db.restaurants.createIndex({ "city": 1 });
    db.reviews.createIndex({ "restaurant_id": 1 });
    db.reviews.createIndex({ "user_id": 1 });
    db.favorites.createIndex({ "user_id": 1 });
    db.restaurant_claims.createIndex({ "restaurant_id": 1 });
    db.chat_conversations.createIndex({ "user_id": 1 });
    db.chat_messages.createIndex({ "conversation_id": 1 });

---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: yelp-prototype
  labels:
    app: mongodb
spec:
  # Headless service for StatefulSet
  clusterIP: None
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
      protocol: TCP

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-pvc
  namespace: yelp-prototype
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: yelp-prototype
  labels:
    app: mongodb
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 27017
          name: mongodb
        env:
        - name: MONGO_INITDB_DATABASE
          value: yelp_db
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
        - name: mongodb-init-script
          mountPath: /docker-entrypoint-initdb.d
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - mongosh --eval "db.adminCommand('ping')"
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - mongosh --eval "db.adminCommand('ping')"
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: mongodb-init-script
        configMap:
          name: mongodb-init-script
  volumeClaimTemplates:
  - metadata:
      name: mongodb-data
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi