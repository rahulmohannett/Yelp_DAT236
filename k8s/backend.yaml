---
# User Service Deployment (Port 8001)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: yelp-prototype
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: yelp-backend:latest
        imagePullPolicy: Never
        command: ["uvicorn", "app.main_user:app", "--host", "0.0.0.0", "--port", "8001"]
        ports:
        - containerPort: 8001
          name: http
        env:
        - name: MONGO_URI
          value: mongodb://mongodb:27017/yelp_db
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: yelp-secrets
              key: SECRET_KEY
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: yelp-secrets
              key: GOOGLE_API_KEY
        - name: TAVILY_API_KEY
          valueFrom:
            secretKeyRef:
              name: yelp-secrets
              key: TAVILY_API_KEY
        - name: CORS_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: yelp-config
              key: CORS_ORIGINS
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: uploads
        persistentVolumeClaim:
          claimName: uploads-pvc

---
# User Service Service
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: yelp-prototype
spec:
  type: ClusterIP
  ports:
  - port: 8001
    targetPort: 8001
    protocol: TCP
  selector:
    app: user-service

