apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
  namespace: yelp-prototype
spec:
  accessModes:
    - ReadWriteOnce  # minikube default storage doesn't support RWX easily
  resources:
    requests:
      storage: 2Gi
  # storageClassName: standard  # Uncomment if using specific storage class