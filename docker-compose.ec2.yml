services:
  user-service:
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
    command: uvicorn app.main_user:app --host 0.0.0.0 --port 8001
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  owner-service:
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
